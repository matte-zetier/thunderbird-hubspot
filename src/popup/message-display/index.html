<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      width: 300px;
      background: #f5f8fa;
      color: #2d3e50;
    }
    header {
      background: #ff7a59;
      color: white;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    main { padding: 12px 14px; }
    section { margin-bottom: 12px; }
    section h2 {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7c98b6;
      margin-bottom: 4px;
    }
    section p, section ul { color: #2d3e50; line-height: 1.5; }
    ul { padding-left: 16px; }
    .muted { color: #7c98b6; font-style: italic; }
    .error { color: #c0392b; }
    .placeholder p {
      color: #7c98b6;
      font-style: italic;
      border-top: 1px solid #dfe3eb;
      padding-top: 10px;
    }
    .search-box { margin-bottom: 10px; }
    .search-box input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #dfe3eb;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      background: white;
      color: #2d3e50;
    }
    .search-box input:focus { outline: none; border-color: #ff7a59; }
    .result-list { list-style: none; padding: 0; }
    .result-item { padding: 6px 0; border-bottom: 1px solid #f0f3f6; }
    .result-item:last-child { border-bottom: none; }
    .result-name { display: block; font-weight: 500; color: #2d3e50; }
    .result-meta { display: block; font-size: 11px; color: #7c98b6; margin-top: 1px; }
    .count { font-weight: 400; color: #7c98b6; }
    .result-label { display: flex; align-items: flex-start; gap: 6px; cursor: pointer; }
    .result-label input[type=checkbox] { margin-top: 2px; flex-shrink: 0; accent-color: #ff7a59; }
    .result-item.pinned { background: #fff8f6; border-radius: 3px; padding: 5px 4px; }
    #crm-action { padding-top: 10px; border-top: 1px solid #dfe3eb; margin-top: 8px; }
    #update-crm-btn {
      width: 100%;
      padding: 7px 12px;
      background: #ff7a59;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    #update-crm-btn:hover { background: #e8622a; }
    #update-crm-btn:disabled { background: #bbb; cursor: not-allowed; }
    #crm-status { margin-top: 6px; font-size: 12px; min-height: 1em; }
    .recipients-scroll { max-height: 162px; overflow-y: auto; }
    .not-in-hs { color: #e67e22; }
    .result-name-row { display: flex; align-items: center; gap: 4px; }
    .role-badge { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 1px 4px; border-radius: 3px; background: #e1ecf7; color: #5f6368; }
  </style>
</head>
<body>
  <header>
    <svg width="18" height="18" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="16" cy="16" r="14" fill="rgba(255,255,255,0.25)"/>
      <text x="16" y="21" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">HS</text>
    </svg>
    <h1>HubSpot</h1>
  </header>
  <main>
    <div id="app">
      <p class="muted">Loading…</p>
    </div>
  </main>
  <script src="index.js"></script>
</body>
</html>
